  COZY BEAGLE — Birthday surprise game
================================================================

  Buscá la línea que dice  const VIDEO_URL =
  Y poné ahí el link de YouTube (formato embed, ej:

  También podés cambiar el mensaje del teléfono en
  const PHONE_MESSAGE  y el texto inicial en  const INTRO_TEXT.
================================================================
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; font-family: 'Kalam', cursive; background: #1a1410; }
  #game-canvas { display: block; width: 100%; height: 100vh; cursor: grab; }
  #game-canvas:active { cursor: grabbing; }

  .overlay {
    position: absolute; pointer-events: none;
    color: #fff5e6; text-shadow: 0 2px 12px rgba(0,0,0,0.7);
  }

  /* INTRO — minimal, centered "Mae, click here to begin adventure" */
  #intro {
    position: absolute;
    z-index: 30;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(60, 35, 25, 0.4) 0%, rgba(20, 12, 8, 0.95) 80%);
    pointer-events: auto;
    cursor: pointer;
  }
  #intro-inner {
    text-align: center;
    animation: gentleFloat 3.5s ease-in-out infinite;
  }
  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  #intro-text {
    font-family: 'Caveat', cursive;
    font-size: 64px;
    font-weight: 700;
    color: #ffd9a8;
    text-shadow: 0 4px 20px rgba(255, 140, 80, 0.4), 0 2px 6px rgba(0,0,0,0.8);
    letter-spacing: 1px;
    line-height: 1.1;
  }
  #intro-text .arrow {
    display: block;
    font-size: 36px;
    margin-top: 18px;
    color: #ffb673;
    animation: pulseArrow 1.5s ease-in-out infinite;
  }
  @keyframes pulseArrow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* MISSION CARD — appears when game starts */
  #mission-card {
    position: absolute;
    z-index: 20;
    top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-2deg);
    background: linear-gradient(135deg, #fff5e0 0%, #fae5c0 100%);
    color: #4a2810; padding: 36px 52px;
    border-radius: 4px;
    text-align: center; max-width: 540px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(120,80,40,0.3);
    pointer-events: auto;
    display: none;
    border: 2px dashed #c47a3a;
    font-family: 'Caveat', cursive;
  }
  #mission-card.show { display: block; animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes cardIn {
    0% { opacity: 0; transform: translate(-50%, -50%) rotate(-2deg) scale(0.5); }
    100% { opacity: 1; transform: translate(-50%, -50%) rotate(-2deg) scale(1); }
  }
  #mission-card h1 {
    font-size: 52px;
    font-weight: 700;
    color: #c44820;
    margin-bottom: 12px;
    text-shadow: 2px 2px 0 rgba(196, 72, 32, 0.15);
    line-height: 1.1;
  }
  #mission-card p {
    font-family: 'Kalam', cursive;
    font-size: 18px;
    color: #5a3a20;
    margin-bottom: 22px;
    line-height: 1.5;
  }
  #mission-card .controls {
    font-family: 'Kalam', cursive;
    font-size: 15px;
    background: rgba(196, 120, 60, 0.15);
    padding: 12px 16px;
    border-radius: 6px;
    color: #5a3a20;
    margin-bottom: 22px;
    line-height: 1.7;
  }
  #mission-card button {
    background: #c44820; color: #fff5e0; border: none;
    padding: 12px 36px; border-radius: 30px;
    font-size: 22px; font-weight: 700; font-family: 'Caveat', cursive;
    cursor: pointer; letter-spacing: 1px;
    transition: transform 0.15s, background 0.2s;
    box-shadow: 0 4px 0 #8a2810;
  }
  #mission-card button:hover { background: #a93a18; transform: translateY(-2px); box-shadow: 0 6px 0 #8a2810; }
  #mission-card button:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a2810; }

  /* HINT — small artistic banner top */
  #hint {
    top: 28px; left: 50%; transform: translateX(-50%);
    background: rgba(40, 25, 20, 0.8); backdrop-filter: blur(6px);
    padding: 14px 28px; border-radius: 30px;
    font-family: 'Caveat', cursive;
    font-size: 26px; font-weight: 600; color: #ffd9a8;
    border: 1px solid rgba(255, 200, 130, 0.3);
    transition: opacity 0.4s;
    letter-spacing: 0.5px;
  }

  /* PHONE PROMPT */
  #phone-prompt {
    bottom: 50px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #d97757, #c44820);
    padding: 16px 32px; border-radius: 30px;
    font-family: 'Caveat', cursive;
    font-size: 30px; font-weight: 700; color: #fff5e0;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    animation: pulse 1.2s ease-in-out infinite;
    display: none;
    border: 2px solid rgba(255, 220, 180, 0.4);
  }
  @keyframes pulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.05); }
  }

  /* HAPPY BIRTHDAY BIG MESSAGE */
  #birthday-message {
    top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
    text-align: center;
    pointer-events: none;
    z-index: 50;
  }
  #birthday-message.show {
    animation: birthdayIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes birthdayIn {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
    60% { transform: translate(-50%, -50%) scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
  }
  #birthday-message h1 {
    font-family: 'Caveat', cursive;
    font-size: 110px; font-weight: 700;
    color: #ffd9a8;
    text-shadow:
      4px 4px 0 #c44820,
      8px 8px 30px rgba(196, 72, 32, 0.8),
      0 0 60px rgba(255, 217, 168, 0.6);
    line-height: 0.95;
    letter-spacing: 2px;
  }
  #birthday-message h2 {
    font-family: 'Caveat', cursive;
    font-size: 130px; font-weight: 700;
    color: #ff8fa3;
    text-shadow:
      4px 4px 0 #a93a58,
      8px 8px 30px rgba(255, 80, 120, 0.7),
      0 0 60px rgba(255, 143, 163, 0.5);
    margin-top: -10px;
    letter-spacing: 3px;
  }
  #birthday-message.fading { animation: fadeOut 1.2s ease-out forwards; animation-delay: 7s; }
  @keyframes fadeOut {
    to { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
  }

  /* VIDEO MODAL */
  #video-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.94); display: none; align-items: center; justify-content: center;
    z-index: 100; flex-direction: column; gap: 24px;
  }
  #video-modal.active { display: flex; }
  #video-modal h2 {
    font-family: 'Caveat', cursive;
    color: #ffd9a8; font-size: 44px; font-weight: 700;
    text-align: center; max-width: 80%;
    text-shadow: 0 0 30px rgba(255, 217, 168, 0.5);
  }
  #video-modal iframe {
    width: min(90vw, 900px); aspect-ratio: 16/9;
    border: none; border-radius: 12px;
    box-shadow: 0 12px 50px rgba(0,0,0,0.7);
  }
</style>

<canvas id="game-canvas"></canvas>

<div id="intro">
  <div id="intro-inner">
    <div id="intro-text">
      Mae, click here to<br>begin your adventure
      <span class="arrow">↓</span>
    </div>
  </div>
</div>

<div id="mission-card">
  <h1>Look for Woodstock<br>and click on him! 🐤</h1>
  <p>He's somewhere in the cozy little apartment<br>waiting for you...</p>
  <div class="controls">
    <strong>WASD</strong> or <strong>arrow keys</strong> to move<br>
    <strong>Click</strong> to interact &nbsp;·&nbsp; <strong>Space</strong> to jump 🐾
  </div>
  <button id="start-btn">Let's go! ✨</button>
</div>

<div id="hint" class="overlay" style="opacity: 0;"></div>

<div id="phone-prompt" class="overlay">📞 The phone is ringing! Go answer it</div>

<div id="birthday-message" class="overlay">
  <h1>Happy Birthday</h1>
  <h2>Maelys!</h2>
</div>

<div id="video-modal">
  <h2 id="video-title">💌 It's for you 💌</h2>
  <iframe id="video-iframe" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//  CONFIG — EDITÁ ESTAS LÍNEAS
// ============================================================
const VIDEO_URL = "https://streamable.com/e/3mcf8t?autoplay=1";
const INTRO_TEXT = "Welcome to your little world... someone's waiting for you.";
const PHONE_MESSAGE = "📞 The phone is ringing! Go answer it";
const VIDEO_TITLE = "💌 It's for you, my love 💌";

// ============================================================
//  SETUP THREE.JS
// ============================================================
const canvas = document.getElementById('game-canvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1410);
scene.fog = new THREE.Fog(0x1a1410, 22, 50);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
const CAMERA_OFFSET = new THREE.Vector3(0, 18, 12);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
//  LIGHTING — cozy warm
// ============================================================
const ambient = new THREE.AmbientLight(0x4a3a30, 0.35);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0x6a5a48, 0.35);
sun.position.set(8, 18, 6);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.left = -20;
sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20;
sun.shadow.camera.bottom = -20;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 50;
sun.shadow.bias = -0.0005;
scene.add(sun);

// soft window glow (nighttime, dimmer)
const windowLight = new THREE.PointLight(0x4a6a8c, 0.25, 10);
windowLight.position.set(-7, 4, -5);
scene.add(windowLight);

// fireplace — main light source, strong warm orange
const fireplace = new THREE.PointLight(0xff6a28, 2.4, 18);
fireplace.position.set(0, 2, -7.5);
fireplace.castShadow = true;
fireplace.shadow.mapSize.width = 1024;
fireplace.shadow.mapSize.height = 1024;
scene.add(fireplace);
// secondary warm spread
const fireplaceAmbient = new THREE.PointLight(0xff8a3a, 0.9, 25);
fireplaceAmbient.position.set(0, 4, -6);
scene.add(fireplaceAmbient);
// Small light to illuminate the portrait next to the fireplace
const portraitLight = new THREE.PointLight(0xffd9a8, 0.8, 5);
portraitLight.position.set(4.2, 4.5, -7.5);
scene.add(portraitLight);

// ============================================================
//  APARTMENT — floor, walls, furniture
// ============================================================
const APT_W = 22, APT_D = 18;

// floor (wood)
const floorGeo = new THREE.PlaneGeometry(APT_W, APT_D);
const floorMat = new THREE.MeshStandardMaterial({ color: 0xc89968, roughness: 0.85 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// wood plank lines on floor
for (let i = -APT_W/2 + 2; i < APT_W/2; i += 2) {
  const plank = new THREE.Mesh(
    new THREE.PlaneGeometry(0.04, APT_D),
    new THREE.MeshStandardMaterial({ color: 0x9c7548, roughness: 0.9 })
  );
  plank.rotation.x = -Math.PI / 2;
  plank.position.set(i, 0.01, 0);
  scene.add(plank);
}

// rug (warm orange/red)
const rug = new THREE.Mesh(
  new THREE.PlaneGeometry(8, 6),
  new THREE.MeshStandardMaterial({ color: 0xc6553a, roughness: 1 })
);
rug.rotation.x = -Math.PI / 2;
rug.position.set(0, 0.02, 1);
rug.receiveShadow = true;
scene.add(rug);
// rug border
const rugBorder = new THREE.Mesh(
  new THREE.PlaneGeometry(8.4, 6.4),
  new THREE.MeshStandardMaterial({ color: 0x8a3a26, roughness: 1 })
);
rugBorder.rotation.x = -Math.PI / 2;
rugBorder.position.set(0, 0.015, 1);
scene.add(rugBorder);

// walls
const wallMat = new THREE.MeshStandardMaterial({ color: 0x6a4a32, roughness: 0.95 });
const wallH = 6;

function makeWall(w, h, d, x, y, z) {
  const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
  wall.position.set(x, y, z);
  wall.receiveShadow = true;
  wall.castShadow = true;
  return wall;
}
// back wall
scene.add(makeWall(APT_W, wallH, 0.3, 0, wallH/2, -APT_D/2));
// left wall
scene.add(makeWall(0.3, wallH, APT_D, -APT_W/2, wallH/2, 0));
// right wall
scene.add(makeWall(0.3, wallH, APT_D, APT_W/2, wallH/2, 0));
// front wall (low so we can see)
scene.add(makeWall(APT_W, 0.5, 0.3, 0, 0.25, APT_D/2));

// window on back wall (cutout style — frame + glass)
const windowFrame = new THREE.Mesh(
  new THREE.BoxGeometry(5, 3.5, 0.4),
  new THREE.MeshStandardMaterial({ color: 0xd4b896, roughness: 0.7 })
);
windowFrame.position.set(-7, 4, -APT_D/2 + 0.1);
scene.add(windowFrame);
const windowGlass = new THREE.Mesh(
  new THREE.BoxGeometry(4.4, 2.9, 0.1),
  new THREE.MeshStandardMaterial({ color: 0x1a2840, emissive: 0x2a3a5a, emissiveIntensity: 0.25, roughness: 0.3 })
);
windowGlass.position.set(-7, 4, -APT_D/2 + 0.3);
scene.add(windowGlass);
// window cross
const cross1 = new THREE.Mesh(new THREE.BoxGeometry(4.4, 0.1, 0.15), new THREE.MeshStandardMaterial({ color: 0xd4b896 }));
cross1.position.set(-7, 4, -APT_D/2 + 0.35); scene.add(cross1);
const cross2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.9, 0.15), new THREE.MeshStandardMaterial({ color: 0xd4b896 }));
cross2.position.set(-7, 4, -APT_D/2 + 0.35); scene.add(cross2);

// collidable items list — must be defined before any addFurniture() calls
const furniture = [];
function addFurniture(mesh, w, d) {
  mesh.userData.collider = { w, d };
  furniture.push(mesh);
  scene.add(mesh);
}

// ============================================================
//  FIREPLACE — main light source
// ============================================================
const fireplaceGroup = new THREE.Group();

// stone mantel (outer frame)
const mantelMat = new THREE.MeshStandardMaterial({ color: 0x6a5550, roughness: 0.95 });
const mantelDarkMat = new THREE.MeshStandardMaterial({ color: 0x4a3830, roughness: 1 });

// outer stone surround
const mantelOuter = new THREE.Mesh(new THREE.BoxGeometry(5, 4.5, 0.5), mantelMat);
mantelOuter.position.set(0, 2.25, 0);
mantelOuter.castShadow = true; mantelOuter.receiveShadow = true;
fireplaceGroup.add(mantelOuter);

// inner dark recess (the actual hearth opening)
const mantelInner = new THREE.Mesh(new THREE.BoxGeometry(3, 2.8, 0.6), mantelDarkMat);
mantelInner.position.set(0, 1.7, 0.05);
fireplaceGroup.add(mantelInner);

// hearth (bottom stone slab)
const hearth = new THREE.Mesh(
  new THREE.BoxGeometry(5.6, 0.3, 1.2),
  new THREE.MeshStandardMaterial({ color: 0x554440, roughness: 1 })
);
hearth.position.set(0, 0.15, 0.6);
hearth.castShadow = true; hearth.receiveShadow = true;
fireplaceGroup.add(hearth);

// mantel shelf (top wood beam)
const mantelShelf = new THREE.Mesh(
  new THREE.BoxGeometry(5.4, 0.3, 0.9),
  new THREE.MeshStandardMaterial({ color: 0x4a2a18, roughness: 0.7 })
);
mantelShelf.position.set(0, 4.4, 0.3);
mantelShelf.castShadow = true;
fireplaceGroup.add(mantelShelf);

// stone texture detail — vertical "bricks"
for (let i = 0; i < 6; i++) {
  const brickLine = new THREE.Mesh(
    new THREE.BoxGeometry(0.05, 4.4, 0.02),
    new THREE.MeshStandardMaterial({ color: 0x3a2a26 })
  );
  brickLine.position.set(-2.2 + i * 0.85, 2.25, 0.26);
  fireplaceGroup.add(brickLine);
}

// candle on mantel (left)
const candle = new THREE.Mesh(
  new THREE.CylinderGeometry(0.12, 0.12, 0.5, 12),
  new THREE.MeshStandardMaterial({ color: 0xfff0d9, roughness: 0.6 })
);
candle.position.set(-1.8, 4.8, 0.3);
candle.castShadow = true;
fireplaceGroup.add(candle);
const flame = new THREE.Mesh(
  new THREE.SphereGeometry(0.08, 8, 8),
  new THREE.MeshStandardMaterial({ color: 0xffaa3a, emissive: 0xff8a3a, emissiveIntensity: 1.2 })
);
flame.scale.set(1, 1.6, 1);
flame.position.set(-1.8, 5.15, 0.3);
fireplaceGroup.add(flame);

// PORTRAIT — large framed picture on BACK WALL, to the right of the fireplace

function updateParticles(dt) {
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.userData.life -= dt;
    if (p.userData.life <= 0) {
      scene.remove(p);
      activeParticles.splice(i, 1);
      continue;
    }
    // physics — balloons float up, others fall
    if (p.userData.isBalloon) {
      // gentle upward buoyancy + air drag + sway
      p.userData.velocity.y += 4 * dt;          // lift
      p.userData.velocity.y = Math.min(p.userData.velocity.y, 4);
      p.userData.velocity.x *= 0.96;
      p.userData.velocity.z *= 0.96;
      // subtle sway side to side
      p.userData.swayPhase += dt * 1.5;
      p.position.x += p.userData.velocity.x * dt + Math.sin(p.userData.swayPhase) * 0.3 * dt;
      p.position.y += p.userData.velocity.y * dt;
      p.position.z += p.userData.velocity.z * dt + Math.cos(p.userData.swayPhase * 0.8) * 0.3 * dt;
      // gentle rotation only (no tumbling)
      p.rotation.z = Math.sin(p.userData.swayPhase) * 0.15;
    } else {
      // gravity-based physics
      p.userData.velocity.y -= 18 * dt;
      p.position.x += p.userData.velocity.x * dt;
      p.position.y += p.userData.velocity.y * dt;
      p.position.z += p.userData.velocity.z * dt;
      // bounce off floor
      if (p.position.y < 0.15) {
        p.position.y = 0.15;
        p.userData.velocity.y *= -0.5;
        p.userData.velocity.x *= 0.7;
        p.userData.velocity.z *= 0.7;
      }
      // rotation (tumbling)
      p.rotation.x += p.userData.angularVelocity.x * dt;
      p.rotation.y += p.userData.angularVelocity.y * dt;
      p.rotation.z += p.userData.angularVelocity.z * dt;
    }
    // fade out
    if (p.userData.life < 1) {
      p.scale.setScalar(Math.max(0.05, p.userData.life * (p.userData.isBalloon ? 1 : 1)));
    }
  }
}

const raycaster = new THREE.Raycaster();

canvas.addEventListener('click', (e) => {
  if (!gameStarted) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // check bird
  if (!birdInteracted) {
    const birdHits = raycaster.intersectObjects(bird.children, true);
    if (birdHits.length > 0) {

      const dist = beagle.position.distanceTo(bird.position);
      if (dist < 3) {
        triggerBirdInteraction();
      } else {
        showHint("Get closer to Woodstock 🐤", 2500);

      return;
    }
  }

  // check phone
  if (phoneRinging && !phoneAnswered) {
    const phoneHits = raycaster.intersectObjects(phoneGroup.children, true);
    if (phoneHits.length > 0) {
      const dist = beagle.position.distanceTo(phoneGroup.position);
      if (dist < 3) {
        answerPhone();
      } else {
        showHint("Get closer to the phone 📞", 2500);
      }
    }
  }
});

// ============================================================
//  RING TONE — classic mechanical landline bell ring
// ============================================================
let audioCtx = null;
let ringInterval = null;
function playRingtone() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // Classic North American "ring ring": two-tone bell (480Hz + 440Hz)
  // played for ~2 seconds, then 4 seconds of silence
  const playBellPair = () => {
    const startT = audioCtx.currentTime;
    // single "ring" lasts about 2 seconds with rapid amplitude tremolo (20Hz clapper)
    const ringDuration = 1.8;
    const freqs = [440, 480]; // the actual tones from a bell-tap phone
    const masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0, startT);
    masterGain.gain.linearRampToValueAtTime(0.25, startT + 0.05);
    masterGain.gain.setValueAtTime(0.25, startT + ringDuration - 0.1);
    masterGain.gain.linearRampToValueAtTime(0, startT + ringDuration);
    masterGain.connect(audioCtx.destination);

    // bandpass to give it that "metallic bell" character
    const bandpass = audioCtx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.value = 460;
    bandpass.Q.value = 4;
    bandpass.connect(masterGain);

    // tremolo (the rapid clapper hitting the bells)
    const tremolo = audioCtx.createGain();
    const tremoloOsc = audioCtx.createOscillator();
    const tremoloDepth = audioCtx.createGain();
    tremoloOsc.frequency.value = 20;  // 20Hz clapper
    tremoloOsc.type = 'sine';
    tremoloDepth.gain.value = 0.5;
    tremoloOsc.connect(tremoloDepth);
    tremoloDepth.connect(tremolo.gain);
    tremolo.gain.value = 0.5;
    tremolo.connect(bandpass);
    tremoloOsc.start(startT);
    tremoloOsc.stop(startT + ringDuration);

    // the two bell tones
    freqs.forEach(freq => {
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle'; // triangle has a slight harmonic edge, more bell-like
      osc.frequency.value = freq;
      // slight pitch wobble for realism
      osc.detune.setValueAtTime(0, startT);
      osc.detune.linearRampToValueAtTime(-3, startT + ringDuration);
      osc.connect(tremolo);
      osc.start(startT);
      osc.stop(startT + ringDuration);
    });

    // a touch of square wave for that buzzy mechanical edge
    const buzz = audioCtx.createOscillator();
    const buzzGain = audioCtx.createGain();
    buzz.type = 'square';
    buzz.frequency.value = 460;
    buzzGain.gain.value = 0.04;
    buzz.connect(buzzGain);
    buzzGain.connect(tremolo);
    buzz.start(startT);
    buzz.stop(startT + ringDuration);
  };

  playBellPair();
  // classic phone cadence: ring 2s, silence 4s, repeat
  ringInterval = setInterval(playBellPair, 6000);
}
function stopRingtone() {
  if (ringInterval) { clearInterval(ringInterval); ringInterval = null; }
}

// ============================================================
//  CROWD CHEER — stadium-style crowd cheering using filtered noise
// ============================================================
function playCrowdCheer() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  const startT = audioCtx.currentTime;
  const duration = 5.5;
  const sr = audioCtx.sampleRate;

  // Master gain
  const cheerGain = audioCtx.createGain();
  cheerGain.gain.setValueAtTime(0, startT);
  cheerGain.gain.linearRampToValueAtTime(0.65, startT + 0.2);
  cheerGain.gain.setValueAtTime(0.65, startT + duration - 1.0);
  cheerGain.gain.linearRampToValueAtTime(0, startT + duration);
  cheerGain.connect(audioCtx.destination);

  // ============================================================
  // CORE TECHNIQUE: a crowd is the sum of hundreds of voices.
  // Individually we hear pitch; en masse, voices average out into
  // a broadband "roar" with formant peaks. We synthesize that roar
  // with pink-ish noise + multiple bandpass filters tuned to vowel
  // formants + slow random amplitude modulation (the "wave" of cheers
  // surging and dipping as different parts of the crowd peak).
  // ============================================================

  // 1) Build a long pink-ish noise buffer with internal "swells"
  // that simulate different parts of the crowd cheering at different
  // moments — this is what makes it sound alive instead of flat noise.
  const bufLen = Math.floor(sr * duration);
  const buf = audioCtx.createBuffer(2, bufLen, sr); // stereo for width

  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    // Pink noise via Voss-McCartney-ish summed octaves
    let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0;
    // Several slow LFO phases — each represents a "section" of the crowd
    // surging up and down independently. Different speeds = the wave effect.
    const sections = [
      { phase: Math.random() * Math.PI * 2, speed: 0.7 },
      { phase: Math.random() * Math.PI * 2, speed: 1.3 },
      { phase: Math.random() * Math.PI * 2, speed: 2.1 },
      { phase: Math.random() * Math.PI * 2, speed: 0.4 },
      { phase: Math.random() * Math.PI * 2, speed: 1.7 },
    ];

    for (let i = 0; i < bufLen; i++) {
      const t = i / sr;
      // pink noise generation
      const white = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;
      const pink = (b0 + b1 + b2 + b3 + b4 + b5 + white * 0.5362) * 0.11;

      // Sum the section LFOs to create a complex amplitude envelope.
      // Average ~0.55, swings between roughly 0.25 and 0.95.
      let amp = 0;
      for (const sec of sections) {
        amp += 0.5 + 0.5 * Math.sin(t * sec.speed * Math.PI * 2 + sec.phase);
      }
      amp /= sections.length;
      // Compress so it stays mostly loud but has audible swells
      amp = 0.4 + amp * 0.6;

      // Slow rise at start, slight roll-off at end, plus small jitter
      // to break up any periodicity (real crowds aren't periodic).
      const fadeIn = Math.min(1, t * 2);
      const tailOff = 1 - Math.max(0, (t - duration * 0.85) / (duration * 0.15)) * 0.3;
      const jitter = 0.92 + Math.random() * 0.16;

      data[i] = pink * amp * fadeIn * tailOff * jitter;
    }
  }

  const crowdSrc = audioCtx.createBufferSource();
  crowdSrc.buffer = buf;

  // 2) Multiple parallel bandpass filters tuned to vowel formants —
  // gives the noise a "human voice" character without sounding like
  // any single voice. Mix of "ah" (~700/1200), "eh" (~500/1900),
  // "oh" (~400/800) formants is what stadium crowds resonate at.
  const formants = [
    { freq: 600, q: 1.2, gain: 1.0 },   // "ah" low formant
    { freq: 1100, q: 1.8, gain: 0.9 },  // "ah" upper formant
    { freq: 1900, q: 2.0, gain: 0.7 },  // "eh" upper formant
    { freq: 350, q: 1.0, gain: 0.8 },   // body / chest resonance
    { freq: 2800, q: 2.5, gain: 0.4 },  // sibilance / brightness
  ];

  const formantSum = audioCtx.createGain();
  formantSum.gain.value = 1.0;
  formantSum.connect(cheerGain);

  formants.forEach(f => {
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = f.freq;
    bp.Q.value = f.q;
    const g = audioCtx.createGain();
    g.gain.value = f.gain * 0.45;
    crowdSrc.connect(bp).connect(g).connect(formantSum);
  });

  // Also send a small amount of dry noise so it has body
  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.15;
  crowdSrc.connect(dryGain).connect(formantSum);

  crowdSrc.start(startT);

  // 3) APPLAUSE LAYER — sharp transient claps scattered throughout.
  // Real applause = many short noise bursts (~5ms each) at random
  // times with bandpass around 2-4kHz. Density makes it sound like
  // dozens vs just a few people.
  const applauseDuration = duration - 0.3;
  const clapsPerSecond = 35; // density of claps (high = big crowd)
  const totalClaps = Math.floor(applauseDuration * clapsPerSecond);

  const applauseGain = audioCtx.createGain();
  applauseGain.gain.value = 0.5;
  const applauseFilter = audioCtx.createBiquadFilter();
  applauseFilter.type = 'bandpass';
  applauseFilter.frequency.value = 2500;
  applauseFilter.Q.value = 0.6;
  applauseFilter.connect(applauseGain).connect(cheerGain);

  for (let c = 0; c < totalClaps; c++) {
    const clapT = startT + 0.1 + Math.random() * applauseDuration;
    // each clap is a tiny noise impulse (~8ms)
    const clapLen = Math.floor(sr * 0.008);
    const clapBuf = audioCtx.createBuffer(1, clapLen, sr);
    const clapData = clapBuf.getChannelData(0);
    for (let j = 0; j < clapLen; j++) {
      const env = Math.exp(-j / (clapLen * 0.3)); // sharp decay
      clapData[j] = (Math.random() * 2 - 1) * env;
    }
    const clapSrc = audioCtx.createBufferSource();
    clapSrc.buffer = clapBuf;
    const clapGain = audioCtx.createGain();
    clapGain.gain.value = 0.15 + Math.random() * 0.25;
    clapSrc.connect(clapGain).connect(applauseFilter);
    clapSrc.start(clapT);
  }

  // 4) Couple of party WHISTLES sprinkled in — these are clearly
  // tonal so they need to be subtle, just for color.
  for (let w = 0; w < 2; w++) {
    const wStart = startT + 0.7 + Math.random() * (duration - 2);
    const wDur = 0.4 + Math.random() * 0.2;
    const wGain = audioCtx.createGain();
    wGain.gain.setValueAtTime(0, wStart);
    wGain.gain.linearRampToValueAtTime(0.12, wStart + 0.04);
    wGain.gain.setValueAtTime(0.12, wStart + wDur - 0.05);
    wGain.gain.linearRampToValueAtTime(0, wStart + wDur);
    wGain.connect(cheerGain);

    const wOsc = audioCtx.createOscillator();
    wOsc.type = 'sine';
    const baseFreq = 1900 + Math.random() * 500;
    wOsc.frequency.setValueAtTime(baseFreq, wStart);
    wOsc.frequency.linearRampToValueAtTime(baseFreq * 1.2, wStart + wDur * 0.5);
    wOsc.frequency.linearRampToValueAtTime(baseFreq, wStart + wDur);
    wOsc.connect(wGain);
    wOsc.start(wStart);
    wOsc.stop(wStart + wDur + 0.05);
  }
}

// ============================================================
//  COZY JAZZ MUSIC — generative lo-fi jazz loop
// ============================================================
let jazzActive = false;
let jazzNodes = [];
let jazzMasterGain = null;

function startJazzMusic() {
  if (jazzActive) return;
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  jazzActive = true;

  // master gain — soft background level
  jazzMasterGain = audioCtx.createGain();
  jazzMasterGain.gain.value = 0.18;
  // gentle low-pass to make it "warm" and lo-fi
  const warmth = audioCtx.createBiquadFilter();
  warmth.type = 'lowpass';
  warmth.frequency.value = 2400;
  warmth.Q.value = 0.7;
  jazzMasterGain.connect(warmth);
  warmth.connect(audioCtx.destination);

  // Cozy jazz progression in C: Cmaj7 → Am7 → Dm7 → G7 → repeat
  // Each chord lasts 4 beats. Tempo: 70 BPM = 0.857s per beat
  const BEAT = 60 / 70;
  // notes given as MIDI numbers; chord = [root, third, fifth, seventh]
  const progression = [
    { root: 48, chord: [60, 64, 67, 71], name: 'Cmaj7' }, // Cmaj7
    { root: 45, chord: [57, 60, 64, 67], name: 'Am7' },   // Am7
    { root: 50, chord: [62, 65, 69, 72], name: 'Dm7' },   // Dm7
    { root: 43, chord: [55, 59, 62, 65], name: 'G7' },    // G7
  ];

  const midiToFreq = (n) => 440 * Math.pow(2, (n - 69) / 12);

  // PIANO chord (soft bell-like with multiple sine harmonics)
  function playChord(notes, time, dur) {
    const chordGain = audioCtx.createGain();
    chordGain.gain.setValueAtTime(0, time);
    chordGain.gain.linearRampToValueAtTime(0.5, time + 0.05);
    chordGain.gain.exponentialRampToValueAtTime(0.001, time + dur);
    chordGain.connect(jazzMasterGain);

    notes.forEach(note => {
      const freq = midiToFreq(note);
      // fundamental
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const oscGain = audioCtx.createGain();
      oscGain.gain.value = 0.18;
      osc.connect(oscGain).connect(chordGain);
      osc.start(time);
      osc.stop(time + dur + 0.1);
      // octave up softer
      const osc2 = audioCtx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = freq * 2;
      const osc2Gain = audioCtx.createGain();
      osc2Gain.gain.value = 0.05;
      osc2.connect(osc2Gain).connect(chordGain);
      osc2.start(time);
      osc2.stop(time + dur + 0.1);
    });
  }

  // BASS — walking bass (single notes per beat)
  function playBassNote(note, time, dur) {
    const freq = midiToFreq(note);
    const bassGain = audioCtx.createGain();
    bassGain.gain.setValueAtTime(0, time);
    bassGain.gain.linearRampToValueAtTime(0.32, time + 0.02);
    bassGain.gain.exponentialRampToValueAtTime(0.001, time + dur);
    bassGain.connect(jazzMasterGain);

    const osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    osc.connect(bassGain);
    osc.start(time);
    osc.stop(time + dur + 0.05);
  }

  // BRUSHED SNARE — soft noise burst with bandpass
  function playBrush(time) {
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 5000;
    bp.Q.value = 0.8;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.08, time);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
    noise.connect(bp).connect(noiseGain).connect(jazzMasterGain);
    noise.start(time);
  }

  // SOFT KICK — sub-bass thump
  function playKick(time) {
    const osc = audioCtx.createOscillator();
    const kg = audioCtx.createGain();
    osc.frequency.setValueAtTime(80, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.1);
    kg.gain.setValueAtTime(0.3, time);
    kg.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
    osc.connect(kg).connect(jazzMasterGain);
    osc.start(time);
    osc.stop(time + 0.25);
  }

  // schedule one bar (4 beats) of one chord
  function scheduleBar(chord, time) {
    // chord stab on beat 1 and beat 3 (held)
    playChord(chord.chord, time, BEAT * 2);
    playChord(chord.chord, time + BEAT * 2, BEAT * 2);

    // walking bass — root, fifth above, third, approach to next
    const walkPattern = [
      chord.chord[0],          // root
      chord.chord[2],          // fifth
      chord.chord[1],          // third
      chord.chord[0] + 2,      // chromatic approach up
    ];
    walkPattern.forEach((note, i) => {
      playBassNote(note, time + BEAT * i, BEAT * 0.95);
    });

    // soft kick on 1 and 3
    playKick(time);
    playKick(time + BEAT * 2);

    // brush on 2 and 4 (the swing feel)
    playBrush(time + BEAT * 1);
    playBrush(time + BEAT * 3);
    // ghost brush on the "and" of 4
    playBrush(time + BEAT * 3.5);
  }

  // schedule a 4-bar phrase
  let nextBarTime = audioCtx.currentTime + 0.2;
  let chordIdx = 0;
  function scheduler() {
    if (!jazzActive) return;
    while (nextBarTime < audioCtx.currentTime + 1) {
      scheduleBar(progression[chordIdx], nextBarTime);
      chordIdx = (chordIdx + 1) % progression.length;
      nextBarTime += BEAT * 4;
    }
    setTimeout(scheduler, 200);
  }
  scheduler();
}

function pauseJazzMusic() {
  if (jazzMasterGain) {
    jazzMasterGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  }
}
function resumeJazzMusic() {
  if (jazzMasterGain) {
    jazzMasterGain.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.5);
  }
}

// ============================================================
//  COLLISION
// ============================================================
function checkCollision(newX, newZ) {
  const playerR = 0.6;
  // walls
  const margin = 0.7;
  if (newX < -APT_W/2 + margin || newX > APT_W/2 - margin) return true;
  if (newZ < -APT_D/2 + margin || newZ > APT_D/2 - margin) return true;
  // furniture
  for (const f of furniture) {
    const c = f.userData.collider;
    if (!c) continue;
    const dx = Math.abs(newX - f.position.x);
    const dz = Math.abs(newZ - f.position.z);
    if (dx < c.w/2 + playerR && dz < c.d/2 + playerR) return true;
  }
  return false;
}

// ============================================================
//  ANIMATION LOOP
// ============================================================
let lastTime = performance.now();
let birdHopPhase = 0;

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (gameStarted) {
    // input
    let dx = 0, dz = 0;
    if (keys['w'] || keys['arrowup'])    dz -= 1;
    if (keys['s'] || keys['arrowdown'])  dz += 1;
    if (keys['a'] || keys['arrowleft'])  dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;

    const moving = dx !== 0 || dz !== 0;
    if (moving) {
      const len = Math.sqrt(dx*dx + dz*dz);
      dx /= len; dz /= len;
      player.targetRotation = Math.atan2(dx, dz);
      const speed = player.speed;
      const newX = player.position.x + dx * speed * dt;
      const newZ = player.position.z + dz * speed * dt;
      if (!checkCollision(newX, player.position.z)) player.position.x = newX;
      if (!checkCollision(player.position.x, newZ)) player.position.z = newZ;
      player.walkPhase += dt * 12;
    } else {
      player.walkPhase *= 0.85;
    }

    // smooth rotation
    let rotDiff = player.targetRotation - player.rotation;
    while (rotDiff > Math.PI) rotDiff -= Math.PI * 2;
    while (rotDiff < -Math.PI) rotDiff += Math.PI * 2;
    player.rotation += rotDiff * Math.min(dt * 12, 1);
    beagle.rotation.y = player.rotation;

    // jump
    if (keys[' '] && !player.jumping) {
      player.jumping = true;
      player.jumpVelocity = 7;
    }
    if (player.jumping) {
      player.position.y += player.jumpVelocity * dt;
      player.jumpVelocity -= 22 * dt;
      if (player.position.y <= 0) {
        player.position.y = 0;
        player.jumping = false;
        player.jumpVelocity = 0;
      }
    }

    // walk animation — leg bobbing + body bob
    const bob = Math.sin(player.walkPhase) * 0.04;
    bodyMesh.position.y = 0.55 + Math.abs(bob);
    legs.forEach((leg, i) => {
      const phase = player.walkPhase + (i % 2) * Math.PI;
      leg.position.z = leg.userData.baseZ + Math.sin(phase) * 0.15 * (moving ? 1 : 0);
      leg.position.y = leg.userData.baseY + Math.max(0, Math.sin(phase + Math.PI/2)) * 0.08 * (moving ? 1 : 0);
    });
    // tail wag
    tail.rotation.z = Math.sin(now * 0.008) * 0.4;
    // ear bounce when moving
    headGroup.children.forEach(child => {
      if (child.userData.baseY !== undefined && child.geometry instanceof THREE.SphereGeometry) {
        child.position.y = child.userData.baseY + (moving ? Math.sin(player.walkPhase * 0.8) * 0.04 : 0);
      }
    });
  }

  // bird animation
  birdHopPhase += dt * (bird.userData.happy ? 8 : 3);
  if (bird.userData.happy) {
    bird.position.y = Math.abs(Math.sin(birdHopPhase)) * 0.6;
    bird.rotation.y += dt * 4;
  } else {
    bird.position.y = Math.abs(Math.sin(birdHopPhase * 0.5)) * 0.15;
    bird.rotation.y = Math.sin(now * 0.001) * 0.3;
  }

  // phone ringing wobble
  if (phoneRinging) {
    phoneGroup.rotation.z = Math.sin(now * 0.025) * 0.15;
    phoneHandle.position.y = 0.34 + Math.abs(Math.sin(now * 0.025)) * 0.1;
    // glow effect
    phoneBase.material.emissive = new THREE.Color(0xff4444);
    phoneBase.material.emissiveIntensity = 0.3 + Math.abs(Math.sin(now * 0.01)) * 0.4;
  }

  // FIREPLACE animation — flames flicker
  flameLayers.forEach((f, idx) => {
    const t = now * 0.005 + f.userData.phase;
    f.scale.y = 0.85 + Math.sin(t * 2.3) * 0.15 + Math.sin(t * 5.1) * 0.08;
    f.scale.x = 0.95 + Math.sin(t * 3.1) * 0.1;
    f.position.x = f.userData.baseX + Math.sin(t * 4) * 0.05;
    f.position.y = f.userData.baseY + Math.sin(t * 2) * 0.06;
    f.rotation.z = Math.sin(t * 1.5) * 0.08;
  });
  // fireplace light flicker
  fireplace.intensity = 2.2 + Math.sin(now * 0.008) * 0.25 + Math.sin(now * 0.023) * 0.15;
  fireplaceAmbient.intensity = 0.85 + Math.sin(now * 0.011) * 0.1;
  // candle flame
  flame.scale.y = 1.5 + Math.sin(now * 0.012) * 0.25;
  flame.scale.x = 1 + Math.sin(now * 0.018) * 0.15;
  // embers floating up
  embers.forEach(em => {
    em.position.y += em.userData.speed * dt;
    em.position.x += em.userData.drift * dt;
    em.userData.life += dt * 0.5;
    em.material.opacity = Math.max(0, 1 - em.userData.life);
    if (em.userData.life > 1.2) {
      em.position.set(
        (Math.random() - 0.5) * 1.5,
        0.8 + Math.random() * 0.5,
        0.3 + (Math.random() - 0.5) * 0.4
      );
      em.userData.life = 0;
      em.material.opacity = 1;
    }
  });

  // particles
  updateParticles(dt);

  // camera follow (top-down, slightly tilted)
  const camTarget = new THREE.Vector3(
    player.position.x + CAMERA_OFFSET.x,
    player.position.y + CAMERA_OFFSET.y,
    player.position.z + CAMERA_OFFSET.z
  );
  camera.position.lerp(camTarget, Math.min(dt * 4, 1));
  camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

  renderer.render(scene, camera);
}

// ============================================================
//  START
// ============================================================

// Note: INTRO_TEXT is no longer used (intro now uses static HTML)
// but we keep the const for legacy reference.

// Click on intro (anywhere) → show mission card
document.getElementById('intro').addEventListener('click', () => {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('mission-card').classList.add('show');
  // unlock audio early on user gesture (browsers require this)
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
});

// Click on "Let's go!" button → start the actual game
document.getElementById('start-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('mission-card').classList.remove('show');
  document.getElementById('mission-card').style.display = 'none';
  gameStarted = true;
  showHint("🐤 Look for Woodstock and click on him!", 5000);
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
  startJazzMusic();
});

// initial camera
camera.position.set(beagle.position.x + CAMERA_OFFSET.x, CAMERA_OFFSET.y, beagle.position.z + CAMERA_OFFSET.z);
camera.lookAt(beagle.position);

animate();
</script>
